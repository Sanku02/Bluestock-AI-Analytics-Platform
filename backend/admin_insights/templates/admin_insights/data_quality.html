<hr>
<h1>Data Quality Matrix</h1>

<table border="1">
    <tr>
        <th>Company</th>
        <th>Year</th>
        <th>Status</th>
    </tr>

    {% for row in rows %}
    <tr>
        <td>{{ row.0 }}</td>
        <td>{{ row.1 }}</td>

        {% if row.2 %}
        <td style="background:lightgreen">
            Present
        </td>
        {% else %}
        <td style="background:#ff9999">
            Missing
        </td>
        {% endif %}
    </tr>
    {% endfor %}
</table>
